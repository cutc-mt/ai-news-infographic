<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Record &amp; Reply - 録画するだけでPC作業をスキル化</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol&family=Yomogi&family=Zen+Kurenaido&display=swap');
@import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
:root{--c1:#0D7C66;--c2:#2BB5A0;--c3:#E8F4F2;--c4:#2D3436;--c5:#D35D4E}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F7FAF9;font-family:'Kaisei Decol',serif;color:#333;line-height:1.6}
.c{max-width:2000px;margin:0 auto;padding:20px}
.hd{text-align:center;padding:40px 20px;margin-bottom:30px;background:linear-gradient(135deg,#2D3436,#0D7C66);border-radius:30px;color:#fff;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(43,181,160,0.15) 0%,transparent 60%);animation:hg 8s ease-in-out infinite}
@keyframes hg{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,20px)}}
.hi{font-size:5em;margin-bottom:10px;animation:fa-bounce 2s infinite}
.hd h1{font-size:2.4em;font-weight:900;margin-bottom:10px;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.hd .sub{font-size:1.3em;opacity:.9;font-family:'Yomogi',cursive}
.hd .dt{font-size:.9em;opacity:.7;margin-top:10px}
.sl{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;margin-bottom:20px}
.cd{flex:1;min-width:280px;max-width:450px;background:#fff;border-radius:20px;padding:20px;box-shadow:5px 5px 15px rgba(0,0,0,.1);position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
.cd:hover{transform:translateY(-5px);box-shadow:8px 8px 25px rgba(0,0,0,.15)}
.cd::before{content:'';position:absolute;top:0;left:0;width:100%;height:5px;background:linear-gradient(90deg,var(--c1),var(--c2))}
.iw{text-align:center;margin:15px 0}
.iw h2{font-size:1.3em;color:var(--c4);margin-top:10px}
.cc{padding:0 10px 15px}
ul.kl{margin:15px 0;padding:0;list-style:none}
ul.kl li{margin-bottom:10px;display:flex;align-items:flex-start;font-size:15px;line-height:1.6}
ul.kl li i{margin-right:8px;color:var(--c2);min-width:16px;margin-top:4px}
.tg{background:var(--c3);color:var(--c4);padding:3px 8px;border-radius:5px;margin-right:5px;display:inline-block;font-weight:bold;font-size:14px}
.sb{position:relative;background:#fff;border:3px solid var(--c1);border-radius:20px;padding:12px 15px;margin:15px 5px;font-family:'Yomogi',cursive;box-shadow:3px 3px 10px rgba(0,0,0,.1);transform:rotate(-1deg)}
.sb::after{content:'';position:absolute;bottom:-13px;left:20px;border-width:12px 8px 0;border-style:solid;border-color:var(--c1) transparent;display:block;width:0}
.sb.rt::after{left:auto;right:20px;transform:rotate(15deg)}
.sb.tp::after{bottom:auto;top:-13px;border-width:0 8px 12px;transform:rotate(-5deg)}
.sb.v1{background:#FFF9E3;border-color:var(--c2);transform:rotate(1deg)}
.sb.v1::after{border-color:var(--c2) transparent}
.sb.v2{background:#FFE9E9;border-color:var(--c5);transform:rotate(-2deg)}
.sb.v2::after{border-color:var(--c5) transparent}
.hw{font-family:'Yomogi',cursive;font-size:15px;line-height:1.5;color:#333}
.hl{background:linear-gradient(transparent 60%,rgba(13,124,102,.25) 60%);font-weight:bold}
.fi{opacity:0;transform:scale(.95);animation:fs .6s ease forwards}
@keyframes fs{to{opacity:1;transform:scale(1)}}
.cd:nth-child(1){animation-delay:.1s}.cd:nth-child(2){animation-delay:.2s}.cd:nth-child(3){animation-delay:.3s}.cd:nth-child(4){animation-delay:.4s}
footer{text-align:center;padding:30px 20px;margin-top:30px;font-size:14px;color:#777;border-top:2px dashed #ddd}
footer a{color:var(--c1);text-decoration:none}footer a:hover{text-decoration:underline}
@media(max-width:1600px){.cd{min-width:280px}}@media(max-width:1200px){.cd{min-width:320px}}@media(max-width:900px){.cd{min-width:380px}}@media(max-width:768px){.sl{flex-direction:column}.cd{width:100%;min-width:auto}}
</style>
</head>
<body>
<div class="c">
<div class="hd">
<div class="hi"><i class="fas fa-circle-play fa-7x"></i></div>
<h1>Codex Record &amp; Reply</h1>
<div class="sub">録画するだけでPC作業をスキル化！ノート自動投稿を実演</div>
<div class="dt"><i class="fas fa-calendar"></i> 2026年6月20日</div>
</div>
